<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金色粒子全息模型交互</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/DRACOLoader.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; }
        #video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        canvas#three-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
        }
        #ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 20;
            color: white;
            pointer-events: none;
        }
        .interactive { pointer-events: auto; }
        .glass-panel {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 16px;
        }
        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, #1a1a00 0%, #000 100%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- 启动层 -->
    <div id="start-overlay" class="p-6">
        <div class="mb-8">
            <h1 class="text-4xl font-bold text-yellow-500 mb-4 tracking-[0.2em]">粒子全息实验室</h1>
            <p class="text-gray-400 max-w-md text-sm leading-relaxed">
                正在准备加载您的 3D 粒子化模型。<br>
                系统将请求摄像头以实现手势交互，若无法开启将自动切换至手动模式。
            </p>
        </div>
        <button id="start-btn" class="bg-yellow-600 hover:bg-yellow-500 text-white px-10 py-4 rounded-full font-bold text-lg shadow-[0_0_30px_rgba(202,138,4,0.4)] transition-all active:scale-95">
            初始化粒子流
        </button>
    </div>

    <!-- 视频背景 -->
    <div id="video-container">
        <video id="input-video" autoplay playsinline muted></video>
        <div id="video-overlay" style="position:absolute; top:0; left:0; width:100%; height:100%; background:black; opacity: 0.65;"></div>
    </div>

    <!-- 3D 渲染 -->
    <canvas id="three-canvas"></canvas>

    <!-- UI 层 -->
    <div id="ui-layer" class="p-8 flex flex-col justify-between">
        <div class="flex justify-between items-start">
            <div class="glass-panel p-6 max-w-sm">
                <h1 class="text-3xl font-bold text-yellow-500 mb-2">金色粒子模型</h1>
                <p id="artifact-desc" class="text-gray-300 text-sm leading-relaxed">
                    当前正在以粒子星云风格渲染您的 GLB 模型。通过 Additive Blending 与 ACESFilmic 色调映射呈现黄金质感。
                </p>
                <div class="mt-4 flex gap-2">
                    <span id="mode-tag" class="px-2 py-1 bg-yellow-900/50 rounded text-[10px] border border-yellow-500 uppercase text-yellow-200 font-bold">检测中</span>
                </div>
            </div>

            <div class="glass-panel p-4 flex flex-col gap-4 interactive">
                <div class="text-xs text-yellow-500 uppercase tracking-widest font-bold">视觉调节</div>
                <div class="flex flex-col gap-2">
                    <label class="text-[10px]">粒子亮度 (环境遮罩)</label>
                    <input type="range" id="opacity-range" min="0" max="1" step="0.01" value="0.35" class="w-40 accent-yellow-500">
                </div>
                <div class="border-t border-yellow-500/20 pt-4 text-[10px] text-gray-400 space-y-2">
                    <p>• 移动手掌：控制模型旋转</p>
                    <p>• 双手开合：缩放模型大小</p>
                    <p>• 备用：鼠标拖拽旋转/滚轮缩放</p>
                </div>
            </div>
        </div>

        <div class="flex justify-center">
            <div class="glass-panel px-4 py-2 text-xs flex items-center gap-2">
                <div id="status-pulse" class="w-2 h-2 bg-gray-500 rounded-full"></div>
                <span id="status-text">系统自检中</span>
            </div>
        </div>
    </div>

    <script>
        // --- 全局状态 ---
        let isCameraActive = false;
        let particleSystem;
        const modelUrl = 'https://raw.githubusercontent.com/yingshi2778-beep/8/main/1.glb';

        // --- Three.js 核心逻辑 ---
        const canvas = document.getElementById('three-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.3;

        camera.position.z = 8;

        // --- 模型粒子化提取 ---
        function loadModelAsParticles() {
            const loader = new THREE.GLTFLoader();
            const dracoLoader = new THREE.DRACOLoader();
            dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
            loader.setDRACOLoader(dracoLoader);

            loader.load(modelUrl, (gltf) => {
                const positions = [];
                gltf.scene.traverse((child) => {
                    if (child.isMesh) {
                        const posAttr = child.geometry.attributes.position;
                        for (let i = 0; i < posAttr.count; i++) {
                            const v = new THREE.Vector3().fromBufferAttribute(posAttr, i);
                            child.localToWorld(v);
                            positions.push(v.x, v.y, v.z);
                        }
                    }
                });

                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));

                const material = new THREE.PointsMaterial({
                    color: 0xffd700,
                    size: 0.018,
                    transparent: true,
                    opacity: 0.8,
                    blending: THREE.AdditiveBlending,
                    sizeAttenuation: true,
                    depthWrite: false
                });

                particleSystem = new THREE.Points(geometry, material);
                
                // 自动居中与缩放
                const box = new THREE.Box3().setFromObject(particleSystem);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 5 / maxDim;
                
                particleSystem.scale.set(scale, scale, scale);
                particleSystem.position.set(-center.x * scale, -center.y * scale, -center.z * scale);
                
                scene.add(particleSystem);
                document.getElementById('status-text').innerText = "模型粒子化完成";
            }, undefined, (err) => {
                console.error("加载失败:", err);
                document.getElementById('status-text').innerText = "模型加载失败";
            });
        }

        // --- 交互系统 ---
        let isMouseDown = false;
        canvas.addEventListener('mousedown', () => isMouseDown = true);
        window.addEventListener('mouseup', () => isMouseDown = false);
        window.addEventListener('mousemove', (e) => {
            if (isMouseDown && !isCameraActive && particleSystem) {
                particleSystem.rotation.y += e.movementX * 0.005;
                particleSystem.rotation.x += e.movementY * 0.005;
            }
        });
        window.addEventListener('wheel', (e) => {
            if (!isCameraActive && particleSystem) {
                const s = particleSystem.scale.x - e.deltaY * 0.001;
                const finalS = Math.max(0.1, Math.min(10, s));
                particleSystem.scale.set(finalS, finalS, finalS);
            }
        });

        // --- MediaPipe Hands ---
        const videoElement = document.getElementById('input-video');
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        let initialDist = null;
        let initialScale = 1;

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0 && particleSystem) {
                isCameraActive = true;
                document.getElementById('status-pulse').className = "w-2 h-2 bg-yellow-400 rounded-full shadow-[0_0_8px_#fbbf24]";
                document.getElementById('status-text').innerText = "手势交互激活";

                if (results.multiHandLandmarks.length === 2) {
                    const h1 = results.multiHandLandmarks[0][8];
                    const h2 = results.multiHandLandmarks[1][8];
                    const d = Math.sqrt(Math.pow(h1.x - h2.x, 2) + Math.pow(h1.y - h2.y, 2));
                    if (initialDist === null) {
                        initialDist = d;
                        initialScale = particleSystem.scale.x;
                    } else {
                        const s = (d / initialDist) * initialScale;
                        particleSystem.scale.set(s, s, s);
                    }
                } else {
                    initialDist = null;
                    const hand = results.multiHandLandmarks[0];
                    particleSystem.rotation.y = (hand[9].x - 0.5) * 4;
                    particleSystem.rotation.x = (hand[9].y - 0.5) * 2;
                }
            }
        });

        // --- 启动逻辑 ---
        document.getElementById('opacity-range').oninput = (e) => {
            document.getElementById('video-overlay').style.opacity = 1 - e.target.value;
        };

        document.getElementById('start-btn').onclick = async () => {
            document.getElementById('start-overlay').style.opacity = "0.5";
            document.getElementById('start-btn').innerText = "正在链接硬件...";
            
            loadModelAsParticles();

            try {
                const cameraFeed = new Camera(videoElement, {
                    onFrame: async () => { await hands.send({image: videoElement}); },
                    width: 1280, height: 720
                });
                
                await Promise.race([
                    cameraFeed.start(),
                    new Promise((_, rej) => setTimeout(() => rej(new Error("Timeout")), 4000))
                ]);

                document.getElementById('start-overlay').style.display = "none";
                document.getElementById('mode-tag').innerText = "手势识别模式";
            } catch (e) {
                console.warn("相机不可用，切换到手动模式");
                document.getElementById('start-overlay').style.display = "none";
                document.getElementById('mode-tag').innerText = "手动操作模式";
                document.getElementById('status-text').innerText = "摄像头权限受限";
            }
            animate();
        };

        function animate() {
            requestAnimationFrame(animate);
            if (particleSystem) {
                const time = Date.now() * 0.001;
                // 呼吸效果
                particleSystem.material.opacity = 0.6 + Math.sin(time * 1.5) * 0.3;
                particleSystem.material.size = 0.015 + Math.sin(time * 2) * 0.005;
                
                // 闲置旋转
                if (!isMouseDown && !isCameraActive) {
                    particleSystem.rotation.y += 0.002;
                }
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
